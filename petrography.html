<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Petrography | Anton Kutyrev</title>
        <meta
            name="description"
            content="Petrography page for Anton Kutyrev."
        />
        <link rel="stylesheet" href="./styles.css" />
        <script src="./script.js" defer></script>
    </head>
    <body>
        <div class="site-shell">
            <header class="site-header" data-site-header="petrography"></header>

            <main>
                <section class="landing-hero rubric-hero">
                    <div class="landing-backdrop">
                        <img
                            src="./assets/images/research/anton-microscope-lab.jpg"
                            alt="Anton Kutyrev working at a microscope."
                        />
                    </div>
                    <div class="landing-inner">
                        <div class="landing-copy">
                            <p class="eyebrow">Microscopy and textures</p>
                            <h1>Petrography</h1>
                            <p class="hero-text">
                                Here, size does not matter (too much)
                            </p>
                        </div>
                    </div>
                </section>

                <section class="section-block">
                    <div class="photo-essay-grid photo-essay-grid-single">
                        <article class="panel photo-entry">
                            <button
                                class="lightbox-trigger"
                                type="button"
                                data-lightbox-src="./assets/images/petrography/23AK127X-large.jpeg"
                                data-lightbox-alt="Petrographic image 23AK127X."
                                data-lightbox-title="23AK127X"
                                data-lightbox-note="Petrography"
                                data-lightbox-zoom="true"
                            >
                                <img
                                    src="./assets/images/petrography/23AK127X-preview.jpeg"
                                    alt="Petrographic image 23AK127X."
                                    loading="lazy"
                                />
                            </button>
                            <div class="photo-entry-copy">
                                <h3>23AK127X</h3>
                            </div>
                        </article>
                    </div>
                </section>
            </main>

            <footer
                class="site-footer"
                data-site-footer
                data-site-footer-secondary="Petrographic notes and imagery"
            ></footer>
        </div>
    </body>
</html>
