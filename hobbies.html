<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hobbies | Anton Kutyrev</title>
    <meta
      name="description"
      content="Hobbies and personal interests of Anton Kutyrev."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header" data-site-header="hobbies"></header>

      <main>
        <section class="landing-hero rubric-hero">
          <div class="landing-backdrop">
            <img
              src="./assets/images/photography/anton-volcanic-landscape.jpg"
              alt="Anton Kutyrev in a volcanic mountain landscape."
            />
          </div>
          <div class="landing-inner">
            <div class="landing-copy">
              <p class="eyebrow">Outside research</p>
              <h1>Hobbies</h1>
              <p class="hero-text">
                A place for material related to painting, skydiving, and other work outside geology.
              </p>
            </div>
          </div>
        </section>

        <section class="section-block">
          <div class="card-grid research-grid research-index-grid research-plates">
            <article class="panel feature-card research-index-card">
              <img
                class="research-index-cover"
                src="./assets/images/hobbies/painting-dachshund.jpg"
                alt="Painting panel image."
                data-lightbox-self
                data-lightbox-title="Painting"
                data-lightbox-note="Hobbies"
                loading="lazy"
              />
              <div class="research-index-copy">
                <h3>Painting</h3>
                <p>
                  A place for paintings, sketches, and notes outside field and
                  laboratory work.
                </p>
              </div>
            </article>
            <article class="panel feature-card research-index-card">
              <img
                class="research-index-cover"
                src="./assets/images/hobbies/skydiving-freefall.png"
                alt="Skydiving panel image."
                data-lightbox-self
                data-lightbox-title="Skydiving"
                data-lightbox-note="Hobbies"
                loading="lazy"
              />
              <div class="research-index-copy">
                <h3>Skydiving</h3>
                <p>
                  A separate space for jumps, images, and short notes beyond
                  the geology pages.
                </p>
              </div>
            </article>
          </div>
        </section>
      </main>

      <footer class="site-footer" data-site-footer data-site-footer-secondary="Painting | Skydiving"></footer>
    </div>
  </body>
</html>
